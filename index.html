<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ready to Continue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #080b11;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 95vh;
            color: #ffffff;
        }
        
        /* Logo Area */
        .logo-area {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #ffffff;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.02);
            padding: 12px 35px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-area i {
            color: #ef4444;
        }
        .logo-area span {
            color: #ef4444;
        }

        /* Container Box */
        .container {
            max-width: 450px;
            width: 100%;
            background: #0f131c;
            padding: 40px 30px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }
        
        /* Progress Steps */
        .steps {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 35px;
        }
        .step {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #10b981;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: white;
        }
        .step.active {
            background: #6366f1;
        }
        .line {
            width: 35px;
            height: 2px;
            background: #10b981;
        }
        .line.active {
            background: #6366f1;
        }

        h2 {
            font-size: 26px;
            margin: 0 0 10px 0;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        p {
            font-size: 14px;
            color: #717f96;
            margin: 0 0 35px 0;
        }
        
        /* Big Center Circle Status Box */
        .status-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 35px;
        }
        .status-circle i {
            font-size: 32px;
            color: #10b981;
        }
        .timer-text {
            font-size: 32px;
            font-weight: bold;
            color: #6366f1;
        }

        /* Gradient Action Button */
        .btn {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            border: none;
            padding: 16px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.25);
        }
        .btn:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(99, 102, 241, 0.4);
        }
        .btn:disabled {
            background: #1f293d !important;
            color: #4b5563 !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }

        /* Features Box Grid (Secure, Fast, Safe) */
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 30px 0;
        }
        .feature-item {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 15px 5px;
            border-radius: 16px;
        }
        .feature-item i {
            font-size: 18px;
            margin-bottom: 8px;
            display: block;
        }
        .feature-item i.secure { color: #10b981; }
        .feature-item i.fast { color: #f59e0b; }
        .feature-item i.safe { color: #3b82f6; }
        
        .feature-item div {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 2px;
            color: #ffffff;
        }
        .feature-item span {
            font-size: 11px;
            color: #4b5563;
        }

        /* Info Note Box */
        .info-box {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 16px;
            font-size: 12px;
            color: #717f96;
            display: flex;
            gap: 10px;
            text-align: left;
            align-items: flex-start;
            line-height: 1.5;
        }
        .info-box i {
            color: #6366f1;
            font-size: 14px;
            margin-top: 2px;
        }
        
        .footer-text {
            font-size: 11px;
            color: #374151;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="logo-area">
    <i class="fas fa-tv"></i> Download<span>Movie</span>
</div>

<div class="container">
    
    <div class="steps">
        <div class="step"><i class="fas fa-check"></i></div>
        <div class="line"></div>
        <div class="step"><i class="fas fa-check"></i></div>
        <div class="line id-line"></div>
        <div class="step id-step"><i class="fas fa-arrow-right"></i></div>
    </div>

    <h2 id="main-heading">Please Wait...</h2>
    <p id="sub-heading">Preparing your link...</p>

    <div class="status-circle">
        <div class="timer-text" id="timer">3</div>
        <i class="fas fa-check" id="check-icon" style="display: none;"></i>
    </div>

    <button class="btn" id="action-btn" onclick="redirectToRandomAd()" disabled>
        <span id="btn-text">Loading...</span>
        <i class="fas fa-arrow-right"></i>
    </button>

    <div class="features">
        <div class="feature-item">
            <i class="fas fa-shield-alt secure"></i>
            <div>Secure</div>
            <span>Encrypted</span>
        </div>
        <div class="feature-item">
            <i class="fas fa-bolt fast"></i>
            <div>Fast</div>
            <span>Quick redirect</span>
        </div>
        <div class="feature-item">
            <i class="fas fa-check-circle safe"></i>
            <div>Safe</div>
            <span>Verified link</span>
        </div>
    </div>

    <div class="info-box">
        <i class="fas fa-info-circle"></i>
        <div>You will be redirected automatically after the countdown. Click the button when it appears to proceed.</div>
    </div>
</div>

<div class="footer-text">Protected by secure link verification</div>

<script>
    const ADS_LINKS = [
        "https://www.effectivecpmnetwork.com/ytx0ia3zxe?key=2781168cf9b4cf2ce6d93aaa2b0c8db9",
        "https://www.effectivecpmnetwork.com/ikcetp5k?key=f49ed26192a212829bb9ab9193401ee3",
        "https://www.effectivecpmnetwork.com/svazkuf6x?key=ab24797ecea81f4f7eb5620e348447db"
    ];
    // ----------------------------------------------------

    let countdownValue = 3;
    
    const timerElement = document.getElementById('timer');
    const checkIcon = document.getElementById('check-icon');
    const btnElement = document.getElementById('action-btn');
    const btnText = document.getElementById('btn-text');
    const mainHeading = document.getElementById('main-heading');
    const subHeading = document.getElementById('sub-heading');

    timerElement.textContent = countdownValue; 
    
    const interval = setInterval(() => {
        countdownValue--;
        
        if (countdownValue >= 0) {
            timerElement.textContent = countdownValue;
        }
        
        if (countdownValue <= 0) {
            clearInterval(interval);
            timerElement.style.display = 'none';
            checkIcon.style.display = 'block';
            mainHeading.textContent = "Ready!";
            subHeading.textContent = "Click the button below to continue";
            
            document.querySelector('.id-line').classList.add('active');
            document.querySelector('.id-step').classList.add('active');
            document.querySelector('.id-step').innerHTML = '<i class="fas fa-check"></i>';
                       btnElement.removeAttribute('disabled');
            btnText.textContent = "Continue";
        }
    }, 1000);

    function redirectToRandomAd() {
        const randomIndex = Math.floor(Math.random() * ADS_LINKS.length);
        const SELECTED_LINK = ADS_LINKS[randomIndex];
        window.location.href = SELECTED_LINK;
    }
</script>

</body>
</html>
